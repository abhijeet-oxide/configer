# staging - pre-production soak, Ashburn DC1.
# Managed by Configer; edits arrive as reviewed pull requests.
global:
  namespace: telco-staging
  deployment_id: staging
  provider: kubernetes
  timezone: UTC
platform:
  environment: staging
resources:
  default:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
networking:
  service_cidr: 10.210.0.0/16
  pod_cidr: 10.211.0.0/16
  ipv6_enabled: false
  legacy_mode: false
services:
  datastore:
    replicas: 2
    endpoint: datastore.stg.demo.local
    port: 5432 # postgres wire protocol
    tls_enabled: true
  cache:
    replicas: 2
    endpoint: cache.stg.demo.local
    port: 6379
    tls_enabled: false
  messaging:
    replicas: 3
    endpoint: message.stg.demo.local
    port: 9092
    tls_enabled: true
security:
  authentication:
    enabled: true
    method: oidc
    token_expiry: 1800
  audit:
    enabled: true
    retention_days: 30
storage:
  classes:
    fast:
      provisioner: csi-fast
      replication: 2
    standard:
      provisioner: csi-standard
      replication: 2
compute:
  ntp:
    servers:
      - 10.30.0.1
application:
  components:
    api:
      replicas: 2
      image: platform/api:v1
