apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
spec:
  replicas: {{ .Values.replicaCount }}
  template:
    spec:
      containers:
        - name: worker
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            - "--concurrency={{ .Values.concurrency }}"
            - "--queue={{ .Values.queue }}"
