server {
    # 8080, not 80: the unprivileged nginx image runs as a non-root user that
    # cannot bind low ports (see frontend/Dockerfile).
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly. Monaco + Ant Design make the JS bundle
    # large; gzip typically cuts the transfer by well over half.
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # Vite emits content-hashed filenames under /assets, so those files are
    # immutable: cache them hard and they never re-download on repeat visits.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached, or clients pin a stale bundle reference
    # after a deploy and load assets that no longer exist.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend service.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
