name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - name: Vet
        run: go vet ./...
      - name: OpenAPI spec is in sync with the code
        working-directory: .
        run: make docs-check
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: backend
      - name: Test
        run: go test ./...
      - name: Build
        run: go build ./...
      - name: Smoke (end-to-end write-back)
        working-directory: .
        run: |
          git config --global user.name ci
          git config --global user.email ci@example.com
          ./scripts/smoke.sh

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm install
      - name: Lint
        run: npm run lint
      - name: Typecheck & build
        run: npm run build
