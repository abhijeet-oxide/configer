# GENERATED by `helm template` and committed for ArgoCD to apply directly.
# This is a real anti-pattern seen in the field: the rendered output is checked
# in next to the source it came from, so the same values now live in TWO places.
# Nothing here should be hand-edited, yet it contains editable-looking values.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop-api
  namespace: shop
spec:
  template:
    spec:
      containers:
        - name: api
          image: "registry.example.com/shop/api:3.2.1"
          ports:
            - containerPort: 8080
          env:
            - name: LOG_LEVEL
              value: "warn"
            - name: FEATURE_CHECKOUT_V2
              value: "true"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shop-api
spec:
  minReplicas: 6
  maxReplicas: 24
