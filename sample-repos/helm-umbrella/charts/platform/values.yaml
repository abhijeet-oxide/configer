# Chart defaults for the platform umbrella chart.
# Every environment inherits these unless it overrides them in its own
# environments/<env>/values.yaml.
replicaCount: 2

image:
  repository: registry.example.com/platform/api
  tag: "2.8.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  host: platform.example.com
  tlsSecret: platform-tls

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 75

postgresql:
  auth:
    database: platform
    username: platform
  primary:
    persistence:
      size: 20Gi

logging:
  level: info
