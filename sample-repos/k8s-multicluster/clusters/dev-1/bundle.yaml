apiVersion: v1
kind: ConfigMap
metadata:
  name: checkout-config
  namespace: dev-1
data:
  LOG_LEVEL: debug
  PAYMENTS_URL: https://payments.dev-1.example.com
  RETRY_BUDGET: "3"
---
apiVersion: v1
kind: Service
metadata:
  name: checkout
  namespace: dev-1
spec:
  type: ClusterIP
  selector:
    app: checkout
  ports:
    - name: http
      port: 80
      targetPort: 8080
