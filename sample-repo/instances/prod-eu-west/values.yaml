# prod-eu-west - gold tier, Dublin DC2.
# Managed by Configer; edits arrive as reviewed pull requests.
global:
  namespace: telco-prod-euw1
  deployment_id: prod-eu-west
  provider: kubernetes
  timezone: UTC
platform:
  environment: production
resources:
  default:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
networking:
  service_cidr: 10.202.0.0/16
  pod_cidr: 10.203.0.0/16
  ipv6_enabled: false
  legacy_mode: false
services:
  datastore:
    replicas: 3
    endpoint: datastore.euw1.demo.local
    port: 5432 # postgres wire protocol
    tls_enabled: true
  cache:
    replicas: 2
    endpoint: cache.euw1.demo.local
    port: 6379
    tls_enabled: true
  messaging:
    replicas: 3
    endpoint: message.euw1.demo.local
    port: 9092
    tls_enabled: true
security:
  authentication:
    enabled: true
    method: oauth2
    token_expiry: 3600
  audit:
    enabled: true
    retention_days: 90
storage:
  classes:
    fast:
      provisioner: csi-fast
      replication: 3
    standard:
      provisioner: csi-standard
      replication: 2
compute:
  ntp:
    servers:
      - 10.20.0.1
      - 10.20.0.2
application:
  components:
    api:
      replicas: 4
      image: platform/api:v1
