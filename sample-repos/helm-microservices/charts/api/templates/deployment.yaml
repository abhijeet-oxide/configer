apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api.fullname" . }}
  namespace: {{ .Values.global.namespace | default "default" }}
spec:
  # replicaCount is ignored entirely when autoscaling is on: the effective value
  # depends on a DIFFERENT parameter, which no per-cell view can express.
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  template:
    spec:
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            {{- range .Values.env }}
            - name: {{ .name }}
              value: {{ tpl .value $ | quote }}
            {{- end }}
          # This timeout is a real, tunable production value - but it lives ONLY
          # in the template. There is no values.yaml key for it to bind to.
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: {{ .Values.service.port }}
            timeoutSeconds: 3
            periodSeconds: 10
