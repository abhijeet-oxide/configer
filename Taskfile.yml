# Taskfile for Configer (https://taskfile.dev). Alternative to the Makefile for
# those who prefer Task: `task` lists commands, `task dev` runs the whole stack.
# Install Task: https://taskfile.dev/installation/  (or just use `make`).
version: "3"

vars:
  CONFIGER_REPO: '{{.CONFIGER_REPO | default "./sample-repo"}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  install:
    desc: Install all dependencies (Go modules + npm)
    cmds:
      - cd backend && go mod download
      - cd frontend && npm install

  dev:
    desc: Run backend (:8080) + frontend (:5173) together
    deps: [backend, frontend] # deps run in parallel

  backend:
    desc: Run only the backend (:8080)
    cmd: cd backend && CONFIGER_REPO={{.CONFIGER_REPO}} go run ./cmd/configer

  frontend:
    desc: Run only the frontend (:5173)
    cmd: cd frontend && npm run dev

  build:
    desc: Build the backend binary + frontend production bundle
    cmds:
      - cd backend && go build -o bin/configer ./cmd/configer
      - cd frontend && npm run build

  test:
    desc: Run backend tests + frontend typecheck
    cmds:
      - cd backend && go test ./...
      - cd frontend && npx tsc --noEmit

  lint:
    desc: go vet + TypeScript typecheck
    cmds:
      - cd backend && go vet ./...
      - cd frontend && npx tsc --noEmit

  docker:
    desc: Run the whole stack via docker compose
    cmd: cd deploy && docker compose up --build

  clean:
    desc: Remove build artifacts
    cmd: rm -rf backend/bin frontend/dist
