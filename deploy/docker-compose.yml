# Self-hosted Configer stack: Go backend + SPA (nginx) + Postgres (the
# platform database: users, sessions, roles, audit). The backend serves the
# grid from a mounted Git working tree; Git remains the single source of
# truth for all configuration.

version: '3.8'

services:
  backend:
    build:
      context: ../backend
    environment:
      # Core settings
      CONFIGER_ADDR: :8080
      CONFIGER_REPO: /repo
      CONFIGER_ENV: production
      CONFIGER_VERSION: 0.1.0
      CONFIGER_LOG_LEVEL: info
      CONFIGER_SYNC_SECONDS: 30
      
      # Git configuration
      CONFIGER_GIT_NAME: Configer Bot
      CONFIGER_GIT_EMAIL: bot@configer.local
      
      # Platform database: Postgres in this stack (an embedded SQLite file is
      # the default when unset — fine for single-node deployments).
      DATABASE_URL: postgres://configer:configer@postgres:5432/configer

      # GitHub OAuth login (fill in to enable multi-user mode; the callback is
      # <public-url>/api/auth/callback).
      # GITHUB_OAUTH_CLIENT_ID: ...
      # GITHUB_OAUTH_CLIENT_SECRET: ...
      # CONFIGER_OAUTH_CALLBACK: https://configer.example.com/api/auth/callback
      # CONFIGER_ADMINS: your-github-login
      # CONFIGER_DEFAULT_ROLE: editor
    volumes:
      # Read-write: Configer commits edits into the repo's real files
      # (write-back-native model).
      - ../sample-repo:/repo
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_URL: http://backend:8080
        VITE_APP_NAME: Configer
        VITE_APP_VERSION: 0.1.0
    environment:
      VITE_API_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8088:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Platform database: users, sessions, per-app roles, audit trail.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: configer
      POSTGRES_PASSWORD: configer
      POSTGRES_DB: configer
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U configer"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
